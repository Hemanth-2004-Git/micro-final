<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101A"/>
      <stop offset="0.6" stop-color="#0B1A2A"/>
      <stop offset="1" stop-color="#050812"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 300) rotate(120) scale(640 520)">
      <stop offset="0" stop-color="#2B75A9" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#47B1BF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#0B1A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="360" y1="220" x2="840" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DC8D6"/>
      <stop offset="0.5" stop-color="#2B75A9"/>
      <stop offset="1" stop-color="#152670"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="32" fill="url(#glow)"/>

  <!-- governance ring -->
  <g filter="url(#soft)">
    <circle cx="600" cy="410" r="210" fill="rgba(255,255,255,0.03)" stroke="url(#ring)" stroke-width="2" opacity="0.95"/>
    <circle cx="600" cy="410" r="176" fill="none" stroke="rgba(93,200,214,0.18)" stroke-width="2" stroke-dasharray="4 10"/>
    <circle cx="600" cy="410" r="144" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/>
  </g>

  <!-- tick marks -->
  <g opacity="0.45">
    <path d="M600 190V214" stroke="rgba(93,200,214,0.7)" stroke-width="2" stroke-linecap="round"/>
    <path d="M600 606V630" stroke="rgba(93,200,214,0.35)" stroke-width="2" stroke-linecap="round"/>
    <path d="M380 410H404" stroke="rgba(93,200,214,0.35)" stroke-width="2" stroke-linecap="round"/>
    <path d="M796 410H820" stroke="rgba(93,200,214,0.7)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- shield/core -->
  <g>
    <path d="M600 300C660 330 705 330 705 330V420C705 495 650 545 600 566C550 545 495 495 495 420V330C495 330 540 330 600 300Z"
      fill="rgba(15,23,42,0.78)" stroke="rgba(148,163,184,0.16)" stroke-width="2"/>
    <path d="M600 326C645 348 675 346 675 346V418C675 474 636 512 600 528C564 512 525 474 525 418V346C525 346 555 348 600 326Z"
      fill="rgba(43,117,169,0.20)" stroke="rgba(93,200,214,0.28)" stroke-width="2"/>
    <path d="M575 432L596 452L632 410" stroke="#5DC8D6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- audit chips -->
  <g opacity="0.96">
    <rect x="200" y="260" width="260" height="58" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="230" y="281" width="165" height="16" rx="8" fill="rgba(71,177,191,0.18)"/>
    <rect x="740" y="270" width="270" height="58" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="770" y="291" width="180" height="16" rx="8" fill="rgba(93,200,214,0.18)"/>
    <rect x="780" y="520" width="230" height="58" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="810" y="541" width="150" height="16" rx="8" fill="rgba(43,117,169,0.18)"/>
  </g>
</svg>
