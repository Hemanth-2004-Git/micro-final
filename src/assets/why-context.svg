<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060A12"/>
      <stop offset="0.55" stop-color="#071628"/>
      <stop offset="1" stop-color="#04060D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 260) rotate(35) scale(620 520)">
      <stop offset="0" stop-color="#47B1BF" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#2B75A9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#071628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="280" y1="170" x2="920" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DC8D6"/>
      <stop offset="0.5" stop-color="#2B75A9"/>
      <stop offset="1" stop-color="#152670"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="32" fill="url(#glow)"/>

  <!-- abstract "context graph" -->
  <g opacity="0.95">
    <path d="M270 500C360 380 470 310 590 300C740 287 860 370 930 470" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <path d="M270 500C360 540 480 575 610 560C760 543 860 485 930 470" stroke="rgba(93,200,214,0.55)" stroke-width="2" stroke-linecap="round"/>
    <path d="M310 280C420 210 540 188 660 210C780 232 860 290 900 360" stroke="rgba(71,177,191,0.35)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="270" cy="500" r="14" fill="rgba(93,200,214,0.25)" stroke="rgba(93,200,214,0.65)"/>
    <circle cx="930" cy="470" r="14" fill="rgba(43,117,169,0.22)" stroke="rgba(43,117,169,0.65)"/>
    <circle cx="590" cy="300" r="16" fill="rgba(71,177,191,0.22)" stroke="rgba(71,177,191,0.7)"/>
    <circle cx="900" cy="360" r="10" fill="rgba(21,38,112,0.22)" stroke="rgba(93,200,214,0.35)"/>
    <circle cx="310" cy="280" r="10" fill="rgba(21,38,112,0.22)" stroke="rgba(93,200,214,0.35)"/>
  </g>

  <!-- chips / labels -->
  <g opacity="0.98">
    <rect x="210" y="545" width="210" height="56" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="250" y="565" width="110" height="16" rx="8" fill="rgba(93,200,214,0.16)"/>
    <rect x="450" y="225" width="265" height="58" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="485" y="246" width="190" height="16" rx="8" fill="rgba(43,117,169,0.18)"/>
    <rect x="770" y="520" width="240" height="56" rx="16" fill="rgba(13,24,40,0.72)" stroke="rgba(148,163,184,0.16)"/>
    <rect x="805" y="540" width="170" height="16" rx="8" fill="rgba(71,177,191,0.16)"/>
  </g>

  <!-- soft bokeh -->
  <g filter="url(#blur)" opacity="0.45">
    <circle cx="250" cy="210" r="40" fill="#47B1BF"/>
    <circle cx="960" cy="240" r="52" fill="#2B75A9"/>
    <circle cx="740" cy="650" r="46" fill="#5DC8D6"/>
  </g>
</svg>
